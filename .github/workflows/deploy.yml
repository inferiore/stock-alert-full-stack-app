name: Deploy to GCP

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/stock-alerts-api:latest

  deploy:
    name: Deploy to GCP Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Desplegar en servidor GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 35.252.78.112
          username: luxuryhorizoncolombia
          key: ${{ secrets.GCP_SSH_KEY }}
          command_timeout: 10m
          script: |
            sudo git config --global --add safe.directory /home/luxuryhorizoncolombia/stock-alert-full-stack-app
            sudo GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git -C /home/luxuryhorizoncolombia/stock-alert-full-stack-app pull
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/luxuryhorizoncolombia/stock-alert-full-stack-app && sudo docker compose -f docker-compose.prod.yml pull && sudo docker compose -f docker-compose.prod.yml up -d
