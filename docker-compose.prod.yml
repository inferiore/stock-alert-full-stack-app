services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    mem_limit: 512m
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', "-u${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 512m

volumes:
  db_data:
